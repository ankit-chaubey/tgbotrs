name: 🦀 CI - Build & Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'tgbotrs/**'
      - 'codegen/**'
      - 'Cargo.toml'
      - 'api.json'
      - '.github/workflows/ci.yml'
      - '.github/scripts/validate_generated.py'
      - '.github/scripts/coverage_report.py'
  pull_request:
    branches: [main]
    paths:
      - 'tgbotrs/**'
      - 'codegen/**'
      - 'Cargo.toml'
      - 'api.json'
      - '.github/workflows/ci.yml'
      - '.github/scripts/validate_generated.py'
      - '.github/scripts/coverage_report.py'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build and test the library
  build:
    name: Build (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]
        include:
          - os: ubuntu-latest
            rust: nightly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-
            ${{ runner.os }}-cargo-

      - name: Build library
        run: cargo build --workspace --verbose

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Run clippy
        if: matrix.rust == 'stable'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check formatting
        if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

  # Validate generated code + coverage report
  # Runs against api.json (committed spec) - not the live feed.
  # This ensures CI stays green even when a new spec has dropped
  # but the auto-regen PR hasn't been merged yet.
  validate-and-coverage:
    name: 🔍 Validate & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Read spec version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('api.json'))['version'])")
          echo "📦 Validating against committed spec: $VERSION"

      - name: Re-run codegen from committed api.json
        run: |
          mkdir -p /tmp/codegen_out
          python3 codegen/codegen.py api.json /tmp/codegen_out

      - name: Compare generated files with committed files
        run: |
          echo "Checking gen_types.rs..."
          if ! diff -q tgbotrs/src/gen_types.rs /tmp/codegen_out/gen_types.rs > /dev/null 2>&1; then
            echo "❌ gen_types.rs is OUT OF SYNC with api.json!"
            echo "Run: python3 codegen/codegen.py api.json tgbotrs/src/ to regenerate"
            diff tgbotrs/src/gen_types.rs /tmp/codegen_out/gen_types.rs | head -50
            exit 1
          fi
          echo "✅ gen_types.rs is in sync"

          echo "Checking gen_methods.rs..."
          if ! diff -q tgbotrs/src/gen_methods.rs /tmp/codegen_out/gen_methods.rs > /dev/null 2>&1; then
            echo "❌ gen_methods.rs is OUT OF SYNC with api.json!"
            echo "Run: python3 codegen/codegen.py api.json tgbotrs/src/ to regenerate"
            diff tgbotrs/src/gen_methods.rs /tmp/codegen_out/gen_methods.rs | head -50
            exit 1
          fi
          echo "✅ gen_methods.rs is in sync"

      - name: Validate all types and methods are covered
        run: |
          python3 .github/scripts/validate_generated.py \
            api.json \
            tgbotrs/src/gen_types.rs \
            tgbotrs/src/gen_methods.rs

      - name: Generate coverage report
        run: |
          python3 .github/scripts/coverage_report.py \
            api.json \
            tgbotrs/src/gen_types.rs \
            tgbotrs/src/gen_methods.rs

      - name: Post coverage to step summary
        run: |
          python3 .github/scripts/coverage_report.py \
            api.json \
            tgbotrs/src/gen_types.rs \
            tgbotrs/src/gen_methods.rs \
            --markdown >> $GITHUB_STEP_SUMMARY
