name: Spec Drift Check

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-drift:
    name: Check for new Telegram Bot API spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest spec commit from tg-spec mirror
        id: remote
        run: |
          LATEST=$(curl -s https://api.github.com/repos/ark0f/tg-bot-api/commits/master \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest upstream spec commit: $LATEST"

      - name: Read pinned spec commit
        id: pinned
        run: |
          PINNED=$(cat spec_commit)
          echo "pinned=$PINNED" >> "$GITHUB_OUTPUT"
          echo "Pinned spec commit: $PINNED"

      - name: Compare commits
        id: compare
        run: |
          if [ "${{ steps.remote.outputs.latest }}" != "${{ steps.pinned.outputs.pinned }}" ]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "Drift detected - new spec available"
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "No drift - spec is current"
          fi

      - name: Regenerate types from latest spec
        if: steps.compare.outputs.drift == 'true'
        run: |
          pip install requests
          python3 .github/scripts/diff_spec.py \
            "${{ steps.pinned.outputs.pinned }}" \
            "${{ steps.remote.outputs.latest }}" \
            > /tmp/spec_diff_summary.txt || true
          cat /tmp/spec_diff_summary.txt || true

          # Download and regenerate
          curl -s "https://raw.githubusercontent.com/ark0f/tg-bot-api/${{ steps.remote.outputs.latest }}/custom.min.json" \
            -o /tmp/new_api.json
          cp /tmp/new_api.json api.json
          python3 codegen/codegen.py api.json tgbotrs/src/
          echo "${{ steps.remote.outputs.latest }}" > spec_commit

      - name: Open PR if drift detected
        if: steps.compare.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update to Telegram Bot API spec ${{ steps.remote.outputs.latest }}"
          branch: auto-regen/spec-${{ steps.remote.outputs.latest }}
          title: "Telegram Bot API spec update (${{ steps.remote.outputs.latest }})"
          body: |
            A new Telegram Bot API spec was detected.

            **Previous spec commit:** `${{ steps.pinned.outputs.pinned }}`
            **New spec commit:** `${{ steps.remote.outputs.latest }}`

            This PR was opened automatically by the spec-drift workflow.
            Review the generated diff and merge when ready.
          labels: auto-generated, spec-update
